# ============================================================
# Batch Data Ingestion – Configuration File
# ============================================================
# Chỉnh sửa các giá trị bên dưới phù hợp với môi trường
# của bạn trước khi chạy pipeline.
#
# Cách dùng:
#   1. Copy file này thành config.yaml (đã có sẵn)
#   2. Sửa các giá trị
#   3. Chạy: python main.py
#
# Hoặc đặt biến môi trường:
#   export HDFS_NAMENODE=http://localhost:9870
#   export HDFS_USER=hdfs

# ─── HDFS Configuration ──────────────────────────────────────
hdfs:
  # Namenode URL (WebHDFS / HttpFS endpoint)
  # Ví dụ:
  #   - Local single-node: http://localhost:9870
  #   - Cluster:          http://namenode.domain.com:9870
  #   - HA ( Namenode active): http://namenode1:9870
  namenode: "http://localhost:9870"

  # User để authenticate với HDFS
  # Ví dụ: hdfs, root, ubuntu, ...
  user: "hdfs"

  # Thư mục gốc chứa dữ liệu raw trên HDFS
  # Pipeline sẽ tạo cấu trúc:
  #   {output_base}/users/users_TIMESTAMP.avro
  #   {output_base}/products/products_TIMESTAMP.avro
  #   ...
  output_base: "/data_lake/raw"

  # Số bản sao (replication factor) cho file trên HDFS
  # Single-node: 1
  # Production cluster: 3
  replication: 1

# ─── Source Data ────────────────────────────────────────────
# Duong dan tu thu muc goc project (Big_data)
# Su dung duong dan tuong doi de hoat dong tren moi may
paths:
  # Thu muc chua file CSV nguon (tu thu muc goc project)
  raw_data_dir: "1_dataset/raw_data/ecommerce_dataset"

  # Thu muc output local (log, checkpoint, ...)
  output_dir: "./output"

  # Thu muc luu file Avro tam thoi truoc khi upload len HDFS
  avro_temp: "./avro_temp"

# ─── Kafka (dự phòng – hiện tại batch không dùng) ─────────
# Giữ lại để sau mở rộng real-time ingestion
kafka:
  bootstrap_servers: "localhost:9092"
  topic_prefix: "ecommerce"

# ─── Data Cleaning ──────────────────────────────────────────
cleaner:
  # Drop dòng trùng lặp (theo key column)
  drop_duplicates: true

  # Điền giá trị mặc định cho NA thay vì drop
  fill_na: true

  # Drop dòng có key column bị NULL/empty
  enforce_not_null: true

  # Trim khoảng trắng thừa ở đầu/cuối chuỗi
  strip_whitespace: true

  # Chuẩn hóa datetime về ISO 8601 (YYYY-MM-DDTHH:MM:SS)
  normalize_dates: true

# ─── Logging ─────────────────────────────────────────────────
log_level: "INFO"
