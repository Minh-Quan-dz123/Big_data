apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller-dashboard
  labels:
    app: seller-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seller-dashboard
  template:
    metadata:
      labels:
        app: seller-dashboard
    spec:
      containers:
      - name: seller-dashboard
        image: seller-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: seller-dashboard-svc
spec:
  type: NodePort
  selector:
    app: seller-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
