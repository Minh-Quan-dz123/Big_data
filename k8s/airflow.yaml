apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      containers:
        - name: airflow
          image: minhquan-airflow-batch:latest   # image bạn build
          ports:
            - containerPort: 8080
          command: ["bash", "-c"]
          args:
            - airflow db migrate &&
              airflow scheduler &
              airflow webserver
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
      volumes:
        - name: dags
          hostPath:
            path: /opt/airflow/dags

---
apiVersion: v1
kind: Service
metadata:
  name: airflow
spec:
  type: NodePort
  selector:
    app: airflow
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081