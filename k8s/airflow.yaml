apiVersion: v1
kind: Secret
metadata:
  name: airflow-secret
type: Opaque
stringData:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:13
          env:
            - name: POSTGRES_USER
              value: airflow
            - name: POSTGRES_PASSWORD
              value: airflow
            - name: POSTGRES_DB
              value: airflow
          ports:
            - containerPort: 5432

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: webserver
          image: minhquan-airflow-batch:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor

            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/dags

            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"

            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN

          command: ["bash", "-c"]
          args:
            - |
              airflow db migrate &&
              airflow users create \
                --username admin \
                --password admin \
                --firstname admin \
                --lastname admin \
                --role Admin \
                --email admin@example.com || true
              exec airflow webserver
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: scheduler
          image: minhquan-airflow-batch:latest
          imagePullPolicy: IfNotPresent

          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor

            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/dags

            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"

            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN

          command: ["bash", "-c"]
          args:
            - |
              airflow db migrate &&
              exec airflow scheduler

---

apiVersion: v1
kind: Service
metadata:
  name: airflow
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081