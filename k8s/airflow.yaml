apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      containers:
        - name: airflow
          image: airflow-batch   # image bạn build
          ports:
            - containerPort: 8080
          command: ["airflow", "standalone"]
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
spec:
  type: NodePort
  selector:
    app: airflow
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081