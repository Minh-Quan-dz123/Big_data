kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
    - containerPort: 30092 # Hứng từ NodePort Kafka 
      hostPort: 9092       # Expose ra localhost:9092 ngoài Windows
      protocol: TCP
    - containerPort: 30017 # Hứng từ NodePort MongoDB  
      hostPort: 27017      # cổng của host 
      protocol: TCP
    - containerPort: 30091 # Hứng từ Web UI MinIO console
      hostPort: 9001      # cổng của host 
      protocol: TCP
    - containerPort: 30079 # Hứng từ Redis 
      hostPort: 6379      # cổng của host 
      protocol: TCP
