apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-layer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: serving-layer
  template:
    metadata:
      labels:
        app: serving-layer
    spec:
      containers:
      - name: api
        image: serving-layer:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: serving-layer
spec:
  selector:
    app: serving-layer
  ports:
  - port: 80
    targetPort: 8000
  type: NodePort