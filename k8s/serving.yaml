apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: serving-api
  template:
    metadata:
      labels:
        app: serving-api
    spec:
      containers:
        - name: serving-api
          image: serving-api:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          env:
            - name: REDIS_HOST
              value: "redis"

            - name: CASSANDRA_HOST
              value: "cassandra"

            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: serving-api
spec:
  selector:
    app: serving-api
  ports:
    - port: 80
      targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: serving-api-external
spec:
  type: NodePort
  selector:
    app: serving-api
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30070