apiVersion: kafka.strimzi.io/v1 # version API của strimzi
kind: KafkaNodePool             # khai báo nóm các node
metadata:
  name: kafka-pool
  labels:
    strimzi.io/cluster: my-cluster
spec:
  replicas: 1                   # chỉ cần 1 node
  roles:                        # Node vừa là controller  vừa là broker
    - controller                # controller quản lý metadata cluster
    - broker                    # broker xử lý message
  storage:
    type: ephemeral             # Storage tạm, pod chết -> mất dữ liệu
---                             # dấu --- để chia thành 2 resoucre khác nhau
apiVersion: kafka.strimzi.io/v1
kind: Kafka
#Kafka (cluster)
#   └── KafkaNodePool (các node chạy cluster)

metadata:
  name: my-cluster
  annotations:
    strimzi.io/node-pools: enabled  #dùng KafkaNodePool
    strimzi.io/kraft: enabled   # dùng Kraft mode, ko cần Zookeeper

spec:
  kafka:
    version: 4.2.0

    listeners:                  # cổng kết nối
      - name: external          # tên listener
        port: 9092              # cổng kafka
       # type: internal          # chỉ cho phép truy cập trong cluster kubernetes
        type: nodeport          # cho phép bên ngoài và trong đều truy cập
        tls: false              # ko mã hóa

    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1

  entityOperator:               # Operator quản lý Kafka trong kubernetes;
    topicOperator: {}           # tự tạo/sửa/xóa kafka topic
    userOperator: {}            # quản lý kafka user + quyền ACL