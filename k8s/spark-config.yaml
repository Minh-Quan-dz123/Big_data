apiVersion: v1
kind: Service
metadata:
  name: spark-master
  labels:
    app: spark-master
spec:
  type: ClusterIP
  ports:
    - port: 7077
      name: rpc
      targetPort: 7077
    - port: 8080
      name: web-ui
      targetPort: 8080
  selector:
    app: spark-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  labels:
    app: spark-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      enableServiceLinks: false
      containers:
        - name: spark-master
          image: apache/spark:3.4.1
          command:
            [
              "/opt/spark/bin/spark-class",
              "org.apache.spark.deploy.master.Master"
            ]
          ports:
            - containerPort: 7077
            - containerPort: 8080
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/spark/data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: csv-data-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  labels:
    app: spark-worker
spec:
  replicas: 2  
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: apache/spark:3.4.1
          command:
            [
              "/opt/spark/bin/spark-class",
              "org.apache.spark.deploy.worker.Worker",
              "spark://spark-master:7077"
            ]
          env:
            - name: SPARK_WORKER_MEMORY
              value: "1g"
            - name: SPARK_WORKER_CORES
              value: "1"
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"